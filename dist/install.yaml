---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: devzero-zxporter
    control-plane: controller-manager
  name: devzero-zxporter-controller-manager-mpa
  namespace: devzero-system
spec:
  ports:
  - name: mpa-grpc
    port: 50051
    protocol: TCP
    targetPort: mpa-grpc
  selector:
    control-plane: controller-manager
  type: ClusterIP
---
apiVersion: scheduling.k8s.io/v1
description: This priority class is for critical zxporter infrastructure components.
globalDefault: false
kind: PriorityClass
metadata:
  name: devzero-zxporter-devzero-zxporter-critical
preemptionPolicy: PreemptLowerPriority
value: 1000000000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: devzero-zxporter
    control-plane: controller-manager
  name: devzero-zxporter-controller-manager
  namespace: devzero-system
spec:
  replicas: 2
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/instance: zxporter
        app.kubernetes.io/name: zxporter
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --mpa-server-port=50051
        - --health-probe-bind-address=:8081
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: CLUSTER_TOKEN
          valueFrom:
            secretKeyRef:
              key: CLUSTER_TOKEN
              name: devzero-zxporter-token
              optional: true
        image: ttl.sh/zxporter:latest
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 50051
          name: mpa-grpc
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 200m
            memory: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - mountPath: /etc/zxporter/config
          name: config-volume
          readOnly: true
      priorityClassName: devzero-zxporter-devzero-zxporter-critical
      securityContext:
        runAsNonRoot: true
      serviceAccountName: devzero-zxporter-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - configMap:
          name: devzero-zxporter-env-config
        name: config-volume
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: devzero-zxporter-devzero-zxporter-pdb
  namespace: devzero-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      control-plane: controller-manager
