      priorityClassName: devzero-zxporter-devzero-zxporter-critical
      hostPID: true
      serviceAccountName: zxporter-nodemon
      volumes:
        - name: "pod-gpu-resources"
          hostPath:
            path: /var/lib/kubelet/pod-resources
        - name: zxporter-nodemon-dcgm-metrics
          configMap:
            name: zxporter-nodemon-dcgm-metrics
      tolerations:
        - effect: NoExecute
          operator: Exists
        - effect: NoSchedule
          operator: Exists
        - effect: PreferNoSchedule
          operator: Exists
      containers:
        - name: zxporter-nodemon
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            readOnlyRootFilesystem: true
            capabilities:
              add:
                - SYS_PTRACE
          image: "ttl.sh/zxporter-nodemon:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6061
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          envFrom:
            - configMapRef:
                name: zxporter-nodemon-zxporter-nodemon
          env:
            - name: "NODE_NAME"
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: "JVM_METRICS_ENABLED"
              value: "true"
            - name: "DCGM_HOST"
              value: "localhost"
          resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 60m
              memory: 256Mi
        - name: dcgm-exporter
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
              drop:
                - NET_RAW
            runAsNonRoot: false
            runAsUser: 0
          image: "nvcr.io/nvidia/k8s/dcgm-exporter:3.3.7-3.5.0-ubuntu22.04"
          imagePullPolicy: IfNotPresent
          command: [ "/bin/bash", "-c" ]
          args:
          # nodemon now schedules on every node (incl. non-GPU), so the DCGM sidecar must idle
          # gracefully instead of crashlooping where there is no GPU. Use the resilient retry loop
          # for all providers, including GCP.
            - hostname $NODE_NAME; for ((;;)) { r=$(dcgm-exporter -f /etc/dcgm-exporter/counters.csv); echo "dcgm-exporter could not run"; sleep 60 ; }
          ports:
            - name: "metrics"
              containerPort: 9400
          env:
            - name: "DCGM_EXPORTER_KUBERNETES"
              value: "true"
            - name: "DCGM_EXPORTER_LISTEN"
              value: ":9400"
            - name: "DCGM_EXPORTER_INTERVAL"
              value: "5000"
            - name: "NODE_NAME"
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: "pod-gpu-resources"
              readOnly: true
              mountPath: "/var/lib/kubelet/pod-resources"
            - name: zxporter-nodemon-dcgm-metrics
              mountPath: "/etc/dcgm-exporter"
