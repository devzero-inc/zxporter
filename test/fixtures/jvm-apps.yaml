apiVersion: v1
kind: Namespace
metadata:
  name: jvm-spike
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java8-xmx-only
  namespace: jvm-spike
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java8-xmx-only
  template:
    metadata:
      labels:
        app: java8-xmx-only
    spec:
      containers:
        - name: app
          image: eclipse-temurin:8-jre
          command: ["sh","-lc"]
          args:
            - |
              cat >/tmp/DummyMain.java <<'EOF'
              public class DummyMain { public static void main(String[] args) throws Exception { for(;;) Thread.sleep(60000); } }
              EOF
              javac /tmp/DummyMain.java
              exec java -Xmx192m -cp /tmp DummyMain
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java11-tool-options
  namespace: jvm-spike
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java11-tool-options
  template:
    metadata:
      labels:
        app: java11-tool-options
    spec:
      containers:
        - name: app
          image: eclipse-temurin:11-jre
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms48m -Xmx160m -XX:MaxRAMPercentage=65 -Dfrom=tooloptions"
          command: ["sh","-lc"]
          args:
            - |
              cat >/tmp/DummyMain.java <<'EOF'
              public class DummyMain { public static void main(String[] args) throws Exception { for(;;) Thread.sleep(60000); } }
              EOF
              javac /tmp/DummyMain.java
              exec java -cp /tmp DummyMain
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java17-maxram-only
  namespace: jvm-spike
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java17-maxram-only
  template:
    metadata:
      labels:
        app: java17-maxram-only
    spec:
      containers:
        - name: app
          image: eclipse-temurin:17-jre
          command: ["sh","-lc"]
          args:
            - |
              cat >/tmp/DummyMain.java <<'EOF'
              public class DummyMain { public static void main(String[] args) throws Exception { for(;;) Thread.sleep(60000); } }
              EOF
              javac /tmp/DummyMain.java
              exec java -XX:MaxRAMPercentage=40 -cp /tmp DummyMain
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: not-java
  namespace: jvm-spike
spec:
  replicas: 1
  selector:
    matchLabels:
      app: not-java
  template:
    metadata:
      labels:
        app: not-java
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh","-lc"]
          args: ["sleep 3600"]
