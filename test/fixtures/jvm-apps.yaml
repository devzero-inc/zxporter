apiVersion: apps/v1
kind: Deployment
metadata:
  name: java21-precedence-env
  namespace: jvm-spike
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java21-precedence-env
  template:
    metadata:
      labels:
        app: java21-precedence-env
    spec:
      containers:
        - name: app
          image: eclipse-temurin:21-jdk
          env:
            # Precedence model: JAVA_TOOL_OPTIONS > JDK_JAVA_OPTIONS > JAVA_OPTS
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms24m -Xmx96m -Dfrom=toolopts"
            - name: JDK_JAVA_OPTIONS
              value: "-Xms32m -Xmx128m -Dfrom=jdkopts"
            - name: JAVA_OPTS
              value: "-Xms40m -Xmx160m -Dfrom=javaopts"
          command: ["sh","-lc"]
          args:
            - |
              cat >/tmp/DummyMain.java <<'EOF'
              public class DummyMain { public static void main(String[] args) throws Exception { for(;;) Thread.sleep(60000); } }
              EOF
              javac /tmp/DummyMain.java
              exec java -cp /tmp DummyMain
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java21-precedence-cmdline
  namespace: jvm-spike
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java21-precedence-cmdline
  template:
    metadata:
      labels:
        app: java21-precedence-cmdline
    spec:
      containers:
        - name: app
          image: eclipse-temurin:21-jdk
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms32m -Xmx128m -Dfrom=toolopts"
          command: ["sh","-lc"]
          args:
            - |
              cat >/tmp/DummyMain.java <<'EOF'
              public class DummyMain { public static void main(String[] args) throws Exception { for(;;) Thread.sleep(60000); } }
              EOF
              javac /tmp/DummyMain.java
              # cmdline should win over env
              exec java -Xms16m -Xmx80m -cp /tmp DummyMain
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: not-java
  namespace: jvm-spike
spec:
  replicas: 1
  selector:
    matchLabels:
      app: not-java
  template:
    metadata:
      labels:
        app: not-java
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh","-lc"]
          args: ["sleep 3600"]
