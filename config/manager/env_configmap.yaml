apiVersion: v1
kind: ConfigMap
metadata:
  name: env-config
  namespace: system
data:
  # If using PAT token, you can comment out CLUSTER_TOKEN and use PAT_TOKEN in the Secret
  CLUSTER_TOKEN: "{{ .cluster_token }}"
  # PAT_TOKEN: "{{ .pat_token }}"  # Uncomment to use PAT token (recommended to use Secret instead)
  KUBE_CONTEXT_NAME: '{{ .kube_context_name }}'
  DAKR_URL: "https://dakr.devzero.io"
  PROMETHEUS_URL: "http://prometheus-dz-prometheus-server.devzero-zxporter.svc.cluster.local:80"
  K8S_PROVIDER: "{{ .k8s_provider }}"
  COLLECTION_FREQUENCY: ""
  BUFFER_SIZE: ""
  EXCLUDED_NAMESPACES: ""
  EXCLUDED_NODES: ""
  TARGET_NAMESPACES: ""
  DISABLE_NETWORK_IO_METRICS: ""
  MASK_SECRET_DATA: ""
  NODE_METRICS_INTERVAL: ""
  WATCHED_CRDS: ""
  DISABLED_COLLECTORS: ""
  EXCLUDED_PODS: ""
  EXCLUDED_DEPLOYMENTS: ""
  EXCLUDED_STATEFULSETS: ""
  EXCLUDED_DAEMONSETS: ""
  EXCLUDED_SERVICES: ""
  EXCLUDED_PVCS: ""
  EXCLUDED_EVENTS: ""
  EXCLUDED_JOBS: ""
  EXCLUDED_CRONJOBS: ""
  EXCLUDED_REPLICATIONCONTROLLERS: ""
  EXCLUDED_INGRESSES: ""
  EXCLUDED_INGRESSCLASSES: ""
  EXCLUDED_NETWORKPOLICIES: ""
  EXCLUDED_ENDPOINTS: ""
  EXCLUDED_SERVICEACCOUNTS: ""
  EXCLUDED_LIMITRANGES: ""
  EXCLUDED_RESOURCEQUOTAS: ""
  EXCLUDED_HPAS: ""
  EXCLUDED_VPAS: ""
  EXCLUDED_ROLES: ""
  EXCLUDED_ROLEBINDINGS: ""
  EXCLUDED_CLUSTERROLES: ""
  EXCLUDED_CLUSTERROLEBINDINGS: ""
  EXCLUDED_PDBS: ""
  EXCLUDED_PSPS: ""
  EXCLUDED_PVS: ""
  EXCLUDED_STORAGECLASSES: ""
  EXCLUDED_CRDS: ""
  EXCLUDED_CRDGROUPS: ""
  # Resource names for token storage (configurable for different environments)
  TOKEN_CREDENTIALS_SECRET_NAME: "devzero-zxporter-credentials"
  TOKEN_RUNTIME_SECRET_NAME: "devzero-zxporter-token"
  TOKEN_SECRET_NAME: "devzero-zxporter-token" # Deprecated, use TOKEN_RUNTIME_SECRET_NAME
  TOKEN_CONFIGMAP_NAME: "devzero-zxporter-env-config"
  USE_SECRET_FOR_TOKEN: "false"
  # === Image Analysis Configuration ===
  IMAGE_ANALYSIS_ENABLED: "true"
  IMAGE_ANALYSIS_INTERVAL_DAYS: "7"
  IMAGE_ANALYSIS_CRON_EXPRESSION: ""
  IMAGE_ANALYSIS_MAX_CONCURRENT_JOBS: "10"
  IMAGE_ANALYSIS_MAX_JOBS_PER_NODE: "1"
  IMAGE_ANALYSIS_BATCH_SIZE: "10"
  IMAGE_ANALYSIS_JOB_TIMEOUT_MINUTES: "30"
  IMAGE_ANALYSIS_MAX_RETRIES: "2"
  IMAGE_ANALYSIS_JOB_NAMESPACE: "devzero-zxporter"
  IMAGE_ANALYSIS_ANALYZER_IMAGE: "devzeroinc/image-analyzer:v1"
  IMAGE_ANALYSIS_JOB_CPU_REQUEST: "500m"
  IMAGE_ANALYSIS_JOB_CPU_LIMIT: "1"
  IMAGE_ANALYSIS_JOB_MEMORY_REQUEST: "1Gi"
  IMAGE_ANALYSIS_JOB_MEMORY_LIMIT: "4Gi"
  IMAGE_ANALYSIS_WORKSPACE_SIZE_LIMIT: "10Gi"
  IMAGE_ANALYSIS_REGISTRY_PULL_RATE_PER_MINUTE: "30"
  IMAGE_ANALYSIS_JOB_TOLERATIONS: "[]"
  IMAGE_ANALYSIS_PREFER_LOCAL: "true"
  IMAGE_ANALYSIS_CONTAINERD_SOCKET_PATH: "/run/containerd/containerd.sock"
  IMAGE_ANALYSIS_CONTAINERD_NAMESPACE: "k8s.io"
  IMAGE_ANALYSIS_FALLBACK_TO_REMOTE: "true"
  IMAGE_ANALYSIS_REMOTE_PULL_TIMEOUT: "5m"
  IMAGE_ANALYSIS_REGISTRY_AUTH_SECRET: ""
  IMAGE_ANALYSIS_TARGET_NAMESPACES: ""
  IMAGE_ANALYSIS_EXCLUDED_NAMESPACES: "kube-system,kube-public"
  IMAGE_ANALYSIS_EXCLUDED_IMAGES: "registry.k8s.io/pause:*"
  IMAGE_ANALYSIS_INCLUDED_IMAGES: ""
  IMAGE_ANALYSIS_LOWEST_EFFICIENCY: "0.90"
  IMAGE_ANALYSIS_HIGHEST_WASTED_BYTES: "50MB"
  IMAGE_ANALYSIS_HIGHEST_USER_WASTED_PERCENT: "0.20"
  IMAGE_ANALYSIS_RESULT_RETENTION_DAYS: "30"
