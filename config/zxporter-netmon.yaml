apiVersion: v1
kind: ServiceAccount
metadata:
  name: zxporter-netmon
  namespace: devzero-system
  labels:
    app: zxporter-netmon
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: zxporter-netmon
  namespace: devzero-system
  labels:
    app: zxporter-netmon
spec:
  selector:
    matchLabels:
      app: zxporter-netmon
  template:
    metadata:
      labels:
        app: zxporter-netmon
    spec:
      # Ensures the node agent can schedule on memory-packed nodes (it would
      # otherwise lose the scheduling race and leave that node without
      # telemetry). Custom class — NOT the reserved system-node-critical,
      # which GKE blocks in non-kube-system namespaces (see #445). Kustomize's
      # nameReference rewrites this to the prefixed PriorityClass name.
      priorityClassName: devzero-zxporter-critical
      serviceAccountName: zxporter-netmon
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      securityContext:
        privileged: true
        capabilities:
          add:
            - NET_ADMIN
            - SYS_RESOURCE
      containers:
        - name: zxporter-netmon
          image: devzero/zxporter-netmon:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: devzero-zxporter-env-config
                optional: true
            - secretRef:
                name: devzero-zxporter-token
                optional: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - SYS_RESOURCE
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
      tolerations:
        - operator: Exists
          effect: NoSchedule
