name: nodejs-metrics-kind

permissions:
  contents: read

on:
  pull_request:
    # Nodemon helm chart templates are exercised here, so do not ignore
    # helm-chart/** — only skip documentation-only changes.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  nodejs-metrics-kind:
    # Use our namespace runner profile (same pattern as image-push workflows).
    # This avoids relying on GitHub-hosted runner labels.
    runs-on: namespace-profile-dz-generic
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          version: v0.27.0
          node_image: kindest/node:v1.32.3
          cluster_name: kind-nodejs-metrics
          wait: 120s

      - name: Install metrics-server
        run: |
          helm repo add metrics-server https://kubernetes-sigs.github.io/metrics-server/
          helm repo update
          helm upgrade --install --set args={--kubelet-insecure-tls} metrics-server metrics-server/metrics-server --namespace kube-system
          kubectl wait --for=condition=available --timeout=300s deployment/metrics-server -n kube-system

      - name: Build nodemon image
        run: |
          docker build -f Dockerfile.nodemon -t zxporter-nodemon:nodejs-ci .

      - name: Load nodemon image into kind
        run: |
          kind load docker-image zxporter-nodemon:nodejs-ci --name kind-nodejs-metrics

      - name: Deploy zxporter-nodemon (runtimeMetrics enabled)
        run: |
          kubectl create ns devzero-system || true
          # Deliberately uses the new canonical Helm key (runtimeMetrics.enabled) rather
          # than the deprecated jvmMetrics.enabled fallback that jvm-metrics-kind-test.yml
          # exercises — between the two workflows both paths get covered on every PR.
          helm upgrade --install zxporter-nodemon ./helm-chart/zxporter-nodemon \
            -n devzero-system \
            --set provider=eks \
            --set dcgmExporter.enabled=false \
            --set runtimeMetrics.enabled=true \
            --set image.repository=zxporter-nodemon \
            --set image.tag=nodejs-ci \
            --set image.pullPolicy=IfNotPresent
          kubectl -n devzero-system rollout status ds/zxporter-nodemon --timeout=180s

      - name: Deploy Node.js test workloads
        run: |
          kubectl apply -f test/fixtures/nodejs-apps.yaml
          kubectl -n nodejs-spike rollout status deploy/node-version-env --timeout=300s
          kubectl -n nodejs-spike rollout status deploy/node-version-binaryscan --timeout=300s
          kubectl -n nodejs-spike rollout status deploy/not-node --timeout=300s

      - name: Deploy a JVM test workload (validates the combined endpoint serves both runtimes)
        run: |
          kubectl apply -f test/fixtures/jvm-apps.yaml
          kubectl -n jvm-spike rollout status deploy/java8-xmx-only --timeout=300s

      - name: Deploy generic-runtime test workloads (.NET, Go, Python, Ruby, Deno, Bun)
        run: |
          kubectl apply -f test/fixtures/runtime-apps.yaml
          for d in python-app ruby-app go-app dotnet-app deno-app bun-app; do
            kubectl -n runtime-spike rollout status deploy/$d --timeout=600s
          done

      - name: Validate nodemon Node.js + combined runtime metrics output
        run: |
          POD_IP=$(kubectl -n devzero-system get pod -l app.kubernetes.io/name=zxporter-nodemon -o jsonpath='{.items[0].status.podIP}')
          echo "nodemon podIP=$POD_IP"

          # Assertions (python; no jq dependency).
          # Avoid `kubectl run -i --rm` + heredoc (flaky/non-interactive on Actions).
          kubectl -n devzero-system run py-assert --image=python:3.12-slim --restart=Never --command -- sleep 3600
          kubectl -n devzero-system wait --for=condition=Ready --timeout=120s pod/py-assert

          kubectl -n devzero-system exec py-assert -- python - <<PY
          import json
          import urllib.request

          pod_ip = '${POD_IP}'

          def fetch(path):
              url = f'http://{pod_ip}:6061{path}'
              with urllib.request.urlopen(url, timeout=30) as r:
                  return json.loads(r.read().decode('utf-8'))

          # --- Legacy /container/nodejs-metrics endpoint ---
          nodejs = fetch('/container/nodejs-metrics?namespace=nodejs-spike')
          by_pod = {m.get('pod'): m for m in nodejs}

          def req_prefix(data, prefix):
              for m in data:
                  pod = m.get('pod', '') or ''
                  if pod.startswith(prefix):
                      return m
              raise SystemExit(f'missing pod prefix={prefix}; got pods={[m.get("pod") for m in data]}')

          if any((m.get('pod', '') or '').startswith('not-node') for m in nodejs):
              raise SystemExit('not-node unexpectedly present in Node.js metrics')

          m_env = req_prefix(nodejs, 'node-version-env')
          if m_env.get('node_version_source') != 'env':
              raise SystemExit(f'node-version-env expected source=env got {m_env.get("node_version_source")!r}')
          if not m_env.get('node_version'):
              raise SystemExit(f'node-version-env expected a resolved version, got {m_env!r}')

          m_scan = req_prefix(nodejs, 'node-version-binaryscan')
          if m_scan.get('node_version_source') != 'binary-scan':
              raise SystemExit(f'node-version-binaryscan expected source=binary-scan got {m_scan.get("node_version_source")!r}')
          if not m_scan.get('node_version'):
              raise SystemExit(f'node-version-binaryscan expected a resolved version, got {m_scan!r}')

          # Both deployments run the identical node:20-slim binary, so env-resolved and
          # binary-scan-resolved versions must agree — the whole point of this pairing.
          if m_env.get('node_version') != m_scan.get('node_version'):
              raise SystemExit(
                  f'env and binary-scan resolved different versions for the same image: '
                  f'{m_env.get("node_version")!r} vs {m_scan.get("node_version")!r}'
              )

          # --- Combined /container/runtime-metrics endpoint ---
          runtime = fetch('/container/runtime-metrics')

          nodejs_pods = {m.get('pod') for m in runtime.get('nodejs', [])}
          if not any((p or '').startswith('node-version-env') for p in nodejs_pods):
              raise SystemExit(f'runtime-metrics missing node-version-env in nodejs bucket; got {nodejs_pods}')
          if not any((p or '').startswith('node-version-binaryscan') for p in nodejs_pods):
              raise SystemExit(f'runtime-metrics missing node-version-binaryscan in nodejs bucket; got {nodejs_pods}')

          jvm_pods = {m.get('pod') for m in runtime.get('jvm', [])}
          if not any((p or '').startswith('java8-xmx-only') for p in jvm_pods):
              raise SystemExit(f'runtime-metrics missing java8-xmx-only in jvm bucket; got {jvm_pods}')

          # --- Generic runtimes bucket ---
          # dotnet-app deliberately exercises the apphost probe path (comm is the
          # app name, not "dotnet"); go-app exercises the buildinfo probe.
          generic = fetch('/container/runtime-metrics?namespace=runtime-spike').get('runtimes', [])
          by_runtime = {}
          for m in generic:
              by_runtime.setdefault(m.get('runtime'), []).append(m)

          expected = {
              'python': 'python-app',
              'ruby': 'ruby-app',
              'go': 'go-app',
              'dotnet': 'dotnet-app',
              'deno': 'deno-app',
              'bun': 'bun-app',
          }
          for runtime_name, pod_prefix in expected.items():
              entries = by_runtime.get(runtime_name, [])
              match = [m for m in entries if (m.get('pod', '') or '').startswith(pod_prefix)]
              if not match:
                  raise SystemExit(
                      f'runtimes bucket missing {runtime_name} for {pod_prefix}; got '
                      f'{[(m.get("runtime"), m.get("pod")) for m in generic]}')
              if not match[0].get('version'):
                  raise SystemExit(f'{runtime_name} ({pod_prefix}) expected a resolved version, got {match[0]!r}')

          print('OK')
          PY

          kubectl -n devzero-system delete pod/py-assert --ignore-not-found=true
