{{- $existing := lookup "v1" "Secret" .Release.Namespace .Values.zxporter.clusterIdentitySecretName }}
{{- if and .Values.zxporter.clusterIdentifier (not $existing) }}
# Auto-created when clusterIdentifier is set in values.yaml and no existing secret is found.
# Annotated with helm.sh/resource-policy: keep so it survives helm uninstall,
# preserving the cluster identity across reinstalls.
# If the secret already exists (e.g. created by a previous install or by the operator),
# it is left untouched so the existing identity wins (case 4: secret wins over values.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.zxporter.clusterIdentitySecretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  CLUSTER_IDENTIFIER: {{ .Values.zxporter.clusterIdentifier | quote }}
{{- end }}
