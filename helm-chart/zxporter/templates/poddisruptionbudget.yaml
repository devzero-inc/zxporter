{{- if and .Values.highAvailability.enabled .Values.highAvailability.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  {{- /* Hardcoded to match the kustomize-generated dist/ bundles, which double-apply the
         "devzero-zxporter-" namePrefix. Keep identical to config/manager/poddisruptionbudget.yaml's
         rendered name so `helm install` and dist/installer_updater.yaml target the SAME PDB. */}}
  name: devzero-zxporter-devzero-zxporter-pdb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zxporter.labels" . | nindent 4 }}
spec:
  {{- if .Values.highAvailability.podDisruptionBudget.minAvailable }}
  minAvailable: {{ .Values.highAvailability.podDisruptionBudget.minAvailable }}
  {{- end }}
  {{- if .Values.highAvailability.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ .Values.highAvailability.podDisruptionBudget.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      control-plane: controller-manager
{{- end }}