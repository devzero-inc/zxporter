{{- if .Values.imageAnalysis.enabled }}
# ServiceAccount for image analysis batch jobs.
# Jobs don't access the K8s API — this SA is only for imagePullSecrets
# to pull the analyzer image itself from private registries if needed.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: image-analyzer
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: devzero-zxporter
    app.kubernetes.io/component: image-analysis
{{- end }}
