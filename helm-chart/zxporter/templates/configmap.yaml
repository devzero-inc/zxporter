apiVersion: v1
data:
  BUFFER_SIZE: ""
  # CLUSTER_IDENTIFIER is intentionally omitted here.
  # It is owned by the cluster identity Secret (clusterIdentitySecretName) and written
  # by the operator at runtime. Keeping it in the ConfigMap causes SSA conflicts on
  # helm upgrade when the operator has already written to that field.
  CLUSTER_IDENTITY_SECRET_NAME: "{{ .Values.zxporter.clusterIdentitySecretName }}"
  {{- if not .Values.zxporter.useSecretForToken }}
  {{- if .Values.zxporter.clusterToken }}
  CLUSTER_TOKEN: "{{ .Values.zxporter.clusterToken }}"
  {{- end }}
  PAT_TOKEN: "{{ .Values.zxporter.patToken }}"
  {{- end }}
  COLLECTION_FREQUENCY: ""
  DISABLE_NETWORK_IO_METRICS: ""
  DISABLED_COLLECTORS: ""
  EXCLUDED_CLUSTERROLEBINDINGS: ""
  EXCLUDED_CLUSTERROLES: ""
  EXCLUDED_CRDGROUPS: ""
  EXCLUDED_CRDS: ""
  EXCLUDED_CRONJOBS: ""
  EXCLUDED_DAEMONSETS: ""
  EXCLUDED_DEPLOYMENTS: ""
  EXCLUDED_ENDPOINTS: ""
  EXCLUDED_EVENTS: ""
  EXCLUDED_HPAS: ""
  EXCLUDED_INGRESSCLASSES: ""
  EXCLUDED_INGRESSES: ""
  EXCLUDED_JOBS: ""
  EXCLUDED_LIMITRANGES: ""
  EXCLUDED_NAMESPACES: ""
  EXCLUDED_NETWORKPOLICIES: ""
  EXCLUDED_NODES: ""
  EXCLUDED_PDBS: ""
  EXCLUDED_PODS: ""
  EXCLUDED_PSPS: ""
  EXCLUDED_PVCS: ""
  EXCLUDED_PVS: ""
  EXCLUDED_REPLICATIONCONTROLLERS: ""
  EXCLUDED_RESOURCEQUOTAS: ""
  EXCLUDED_ROLEBINDINGS: ""
  EXCLUDED_ROLES: ""
  EXCLUDED_SERVICEACCOUNTS: ""
  EXCLUDED_SERVICES: ""
  EXCLUDED_STATEFULSETS: ""
  EXCLUDED_STORAGECLASSES: ""
  EXCLUDED_VPAS: ""
  K8S_PROVIDER: "{{ .Values.zxporter.k8sProvider }}"
  KUBE_CONTEXT_NAME: "{{ .Values.zxporter.kubeContextName }}"
  LOG_LEVEL: "{{ .Values.zxporter.logLevel }}"
  MASK_SECRET_DATA: ""
  NODE_METRICS_INTERVAL: ""
  PROMETHEUS_URL: "{{ .Values.zxporter.prometheusUrl }}"
  DAKR_URL: "{{ .Values.zxporter.dakrUrl }}"
  TARGET_NAMESPACES: "{{ .Values.zxporter.targetNamespaces }}"
  TOKEN_CONFIGMAP_NAME: "{{ .Values.zxporter.tokenConfigMapName }}"
  TOKEN_CREDENTIALS_SECRET_NAME: "{{ .Values.zxporter.tokenCredentialsSecretName }}"
  TOKEN_RUNTIME_SECRET_NAME: "{{ .Values.zxporter.tokenSecretName }}"
  TOKEN_SECRET_NAME: "{{ .Values.zxporter.tokenSecretName }}"
  USE_SECRET_FOR_TOKEN: "{{ .Values.zxporter.useSecretForToken }}"
  WATCHED_CRDS: ""
kind: ConfigMap
metadata:
  name: {{ .Values.zxporter.tokenConfigMapName }}
  namespace: {{ .Release.Namespace }}
