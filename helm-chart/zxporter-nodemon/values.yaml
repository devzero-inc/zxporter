provider: "" # gcp | aws | azure | oci | other | eks (legacy alias for aws)
# fullnameOverride pins all nodemon resource names to a stable value, independent of the Helm
# release name. It MUST stay "zxporter-nodemon" so that:
#   1. the zxporter controller can discover nodemon pods via the fixed label selector
#      app.kubernetes.io/name=zxporter-nodemon (see internal/collector/nodemon_client.go), and
#   2. names + selectors match the generated dist/ bundles, so running dist/installer_updater.yaml
#      after a Helm install updates the existing resources instead of creating duplicates.
nameOverride: ""
fullnameOverride: "zxporter-nodemon"
imagePullSecrets: []
serviceAccount:
  create: true
  annotations: {}
image:
  repository: docker.io/devzeroinc/zxporter-nodemon
  pullPolicy: IfNotPresent
  tag: "v0.0.94"
nodemon:
  # nodemon.affinity -- optional pod affinity/anti-affinity. Leave empty so nodemon schedules on
  # EVERY node (it is the sole source of node/container metrics). Only set this if you intentionally
  # want to restrict where nodemon runs. NOTE: this is no longer GPU-gated on GCP — DCGM/GPU metrics
  # are handled by the dcgm-exporter sidecar, which idles gracefully on non-GPU nodes.
  affinity:
  config: {}
  # config:
  #   # address of the DCGM exporter instance
  #   DCGM_HOST: ""
  #   # comma-separated list of labels that the DCGM instances have
  #   DCGM_LABELS: ""
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 60m
      memory: 256Mi
  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
  port: 6061
  tolerations:
    - effect: "NoExecute"
      operator: "Exists"
    - effect: "NoSchedule"
      operator: "Exists"
    - effect: "PreferNoSchedule"
      operator: "Exists"
  rbac:
    clusterWide: true
# jvmMetrics -- Enable JVM metrics collection via hsperfdata.
# NOTE: requires hostPID + running nodemon as UID 0 to read /proc/<pid>/root/tmp/hsperfdata_*/<nsPid>
jvmMetrics:
  enabled: true
# global.priorityClass.enabled is the single toggle for using the custom
# PriorityClass. The parent zxporter chart supplies it (auto-propagated to this
# subchart); this default applies when nodemon is installed standalone (CI,
# helm-release-nodemon).
global:
  priorityClass:
    enabled: true
# Assigns the node agent a custom PriorityClass so it can schedule on
# memory-packed nodes. When installed standalone the subchart creates the
# PriorityClass itself (create: true). When installed via the parent zxporter
# chart, the parent already owns the object and overrides create to false to
# avoid duplicate ownership. value/description/preemptionPolicy must match the
# parent's so the class is identical whichever chart creates it.
priorityClass:
  create: true
  value: 1000000000
  description: "This priority class is for critical zxporter infrastructure components."
  preemptionPolicy: PreemptLowerPriority
dcgmExporter:
  enabled: true
  # runtimeClassName -- RuntimeClass applied to the GPU-only DaemonSet
  # (zxporter-nodemon-gpu). Set to "nvidia" (default) so the NVIDIA container
  # runtime injects host driver libraries (libnvidia-ml.so) into the DCGM sidecar.
  # The GPU DaemonSet only schedules on nodes labelled nvidia.com/gpu.present=true
  # (set by the NVIDIA GPU Operator), so the RuntimeClass is never evaluated on
  # nodes that lack it. Set to "" to disable the split and fall back to the
  # original single DaemonSet with an embedded DCGM sidecar (e.g. GKE COS where
  # the driver is host-mounted via provider=gcp).
  runtimeClassName: "nvidia"
  # gpuNodeSelector -- label used to identify GPU Operator nodes for the split.
  # The GPU DaemonSet includes nodes matching this label; the base DaemonSet
  # excludes them. Only nodes where the GPU Operator's node-feature-discovery
  # sets this label will get the runtimeClassName pod.
  gpuNodeSelector:
    key: "nvidia.com/gpu.present"
    value: "true"
  image:
    repository: nvcr.io/nvidia/k8s/dcgm-exporter
    pullPolicy: IfNotPresent
    tag: 4.5.2-4.8.1-ubuntu22.04
  useExternalHostEngine: false
  # extraEnv -- extra env vars for the dcgm-exporter sidecar, e.g. LD_LIBRARY_PATH
  # when the driver lives outside the provider=gcp default (/usr/local/nvidia/lib64).
  # These are appended to what the chart already sets, so don't redefine the chart's
  # own vars (duplicates are invalid). LD_LIBRARY_PATH is the exception — setting it
  # here replaces the provider=gcp default instead of duplicating it.
  extraEnv: []
  #  - name: LD_LIBRARY_PATH
  #    value: /usr/local/nvidia/lib64
# updateStrategy -- Controls `daemonset.spec.updateStrategy` field.
# updateStrategy:
#   type: RollingUpdate
#   rollingUpdate:
#     maxUnavailable: 1
updateStrategy: {}
