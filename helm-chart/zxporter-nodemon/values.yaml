provider: "" # gcp | eks | azure | 
imagePullSecrets: [ ]

serviceAccount:
  create: true
  automount: true
  annotations: { }

image:
  repository: docker.io/devzeroinc/zxporter-nodemon
  pullPolicy: IfNotPresent
  tag: "v0.0.81"

nodemon:
  # the affinity field is the preferred way of adding affinity annotations
  # for gcp provider the gcp.affinity will be used if this isn't defined but in the future custom affinity annotations
  # should be defined in the nodemon.affinity field
  affinity:
  config: { }
  # config:
  #   # address of the DCGM exporter instance
  #   DCGM_HOST: ""
  #   # comma-separated list of labels that the DCGM instances have
  #   DCGM_LABELS: ""
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
  port: 6061
  tolerations:
    - effect: "NoExecute"
      operator: "Exists"
    - effect: "NoSchedule"
      operator: "Exists"
    - effect: "PreferNoSchedule"
      operator: "Exists"
  rbac:
    clusterWide: true

# jvmMetrics -- Enable JVM metrics collection via hsperfdata.
# NOTE: requires hostPID + running nodemon as UID 0 to read /proc/<pid>/root/tmp/hsperfdata_*/<nsPid>
jvmMetrics:
  enabled: false

dcgmExporter:
  enabled: true
  image:
    repository: nvcr.io/nvidia/k8s/dcgm-exporter
    pullPolicy: IfNotPresent
    tag: 3.3.7-3.5.0-ubuntu22.04
  useExternalHostEngine: false

gcp:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: cloud.google.com/gke-accelerator
                operator: Exists

migrate:
  image:
    repository: alpine/k8s
    pullPolicy: IfNotPresent
    tag: 1.31.0

# updateStrategy -- Controls `daemonset.spec.updateStrategy` field.
# updateStrategy:
#   type: RollingUpdate
#   rollingUpdate:
#     maxUnavailable: 1
updateStrategy: {}
