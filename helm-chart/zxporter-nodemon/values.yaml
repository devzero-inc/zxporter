provider: "" # gcp | eks | azure |

# fullnameOverride pins all nodemon resource names to a stable value, independent of the Helm
# release name. It MUST stay "zxporter-nodemon" so that:
#   1. the zxporter controller can discover nodemon pods via the fixed label selector
#      app.kubernetes.io/name=zxporter-nodemon (see internal/collector/nodemon_client.go), and
#   2. names + selectors match the generated dist/ bundles, so running dist/installer_updater.yaml
#      after a Helm install updates the existing resources instead of creating duplicates.
nameOverride: ""
fullnameOverride: "zxporter-nodemon"

imagePullSecrets: [ ]

serviceAccount:
  create: true
  automount: true
  annotations: { }

image:
  repository: docker.io/devzeroinc/zxporter-nodemon
  pullPolicy: IfNotPresent
  tag: "v0.0.85"

nodemon:
  # nodemon.affinity -- optional pod affinity/anti-affinity. Leave empty so nodemon schedules on
  # EVERY node (it is the sole source of node/container metrics). Only set this if you intentionally
  # want to restrict where nodemon runs. NOTE: this is no longer GPU-gated on GCP — DCGM/GPU metrics
  # are handled by the dcgm-exporter sidecar, which idles gracefully on non-GPU nodes.
  affinity:
  config: { }
  # config:
  #   # address of the DCGM exporter instance
  #   DCGM_HOST: ""
  #   # comma-separated list of labels that the DCGM instances have
  #   DCGM_LABELS: ""
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 60m
      memory: 256Mi
  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
  port: 6061
  tolerations:
    - effect: "NoExecute"
      operator: "Exists"
    - effect: "NoSchedule"
      operator: "Exists"
    - effect: "PreferNoSchedule"
      operator: "Exists"
  rbac:
    clusterWide: true

# jvmMetrics -- Enable JVM metrics collection via hsperfdata.
# NOTE: requires hostPID + running nodemon as UID 0 to read /proc/<pid>/root/tmp/hsperfdata_*/<nsPid>
jvmMetrics:
  enabled: true

dcgmExporter:
  enabled: true
  image:
    repository: nvcr.io/nvidia/k8s/dcgm-exporter
    pullPolicy: IfNotPresent
    tag: 3.3.7-3.5.0-ubuntu22.04
  useExternalHostEngine: false

migrate:
  image:
    repository: alpine/k8s
    pullPolicy: IfNotPresent
    tag: 1.31.0

# updateStrategy -- Controls `daemonset.spec.updateStrategy` field.
# updateStrategy:
#   type: RollingUpdate
#   rollingUpdate:
#     maxUnavailable: 1
updateStrategy: {}
