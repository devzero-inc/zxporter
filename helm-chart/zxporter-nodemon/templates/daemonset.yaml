{{- $rc := .Values.dcgmExporter.runtimeClassName | default "" | toString }}
{{- $provider := required ".Values.provider is required (gcp|eks|azure)" .Values.provider }}
{{- $gpuKey := .Values.dcgmExporter.gpuNodeSelector.key | default "" | toString }}
{{- $gpuVal := .Values.dcgmExporter.gpuNodeSelector.value | default "" | toString }}
{{- $split := and .Values.dcgmExporter.enabled (ne $rc "") (ne $gpuKey "") }}
{{- $base := include "zxporter-nodemon.fullname" . }}
{{- $gpuName := printf "%s-gpu" ($base | trunc 59 | trimSuffix "-") }}
{{- $variants := list (dict "name" $base "instance" $base "withDcgm" .Values.dcgmExporter.enabled "rc" "" "gpuAff" "none") }}
{{- if $split }}
{{-   $variants = list
        (dict "name" $base "instance" $base "withDcgm" true "rc" "" "gpuAff" "exclude")
        (dict "name" $gpuName "instance" $gpuName "withDcgm" true "rc" $rc "gpuAff" "include") }}
{{- end }}
{{- range $v := $variants }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ $v.name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    helm.sh/chart: {{ include "zxporter-nodemon.chart" $ }}
    app.kubernetes.io/name: {{ include "zxporter-nodemon.name" $ }}
    app.kubernetes.io/instance: {{ $v.instance }}
    {{- if $.Chart.AppVersion }}
    app.kubernetes.io/version: {{ $.Chart.AppVersion | quote }}
    {{- end }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
  {{- if $v.withDcgm }}
  annotations:
    ignore-check.kube-linter.io/privileged-container: "This daemon set needs to run DCGM Exporter as privileged to access the GPU metrics."
    ignore-check.kube-linter.io/run-as-non-root: "This daemon set needs to run DCGM Exporter as root to access the GPU metrics."
    ignore-check.kube-linter.io/privilege-escalation-container: "This daemon set needs escalate privileges for DCGM Exporter."
    ignore-check.kube-linter.io/no-read-only-root-fs: "This daemon set needs to run DCGM Exporter with read-only root filesystem."
  {{- end }}
spec:
  {{- with $.Values.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "zxporter-nodemon.name" $ }}
      app.kubernetes.io/instance: {{ $v.instance }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "zxporter-nodemon.name" $ }}
        app.kubernetes.io/instance: {{ $v.instance }}
    spec:
      {{- if $.Values.global.priorityClass.enabled }}
      {{- /* Lets the node agent schedule on memory-packed nodes instead of losing the
             scheduling race and leaving that node without telemetry. Custom class — NOT the
             reserved system-node-critical, which GKE blocks in non-kube-system namespaces (#445).
             Gated on the shared global so the reference and the PriorityClass object (created by
             this subchart when standalone, or the parent chart when bundled) can't drift. */}}
      priorityClassName: devzero-zxporter-devzero-zxporter-critical
      {{- end }}
      {{- if $.Values.jvmMetrics.enabled }}
      hostPID: true
      {{- end }}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $v.rc }}
      runtimeClassName: {{ $v.rc | quote }}
      {{- end }}
      serviceAccountName: {{ include "zxporter-nodemon.serviceAccountName" $ }}
      {{- if $v.withDcgm }}
      volumes:
        - name: "pod-gpu-resources"
          hostPath:
            path: /var/lib/kubelet/pod-resources
        - name: {{- include "dcgm-exporter.config-map" $ | indent 1 }}
          configMap:
            name: {{- include "dcgm-exporter.config-map" $ | indent 1 }}
        {{- if eq $.Values.provider "gcp" }}
        - name: "nvidia-install-dir-host"
          hostPath:
            path: /home/kubernetes/bin/nvidia
        {{- end }}
      {{- end }}
      {{- with $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if eq $v.gpuAff "none" }}
      {{- with $.Values.nodemon.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- else }}
      {{- $affinity := deepCopy ($.Values.nodemon.affinity | default dict) }}
      {{- $nodeAffinity := deepCopy (get $affinity "nodeAffinity" | default dict) }}
      {{- $required := deepCopy (get $nodeAffinity "requiredDuringSchedulingIgnoredDuringExecution" | default dict) }}
      {{- $userTerms := get $required "nodeSelectorTerms" | default list }}
      {{- $gpuExpr := dict "key" $gpuKey "operator" "In" "values" (list $gpuVal) }}
      {{- $antiGpuExpr := dict "key" $gpuKey "operator" "NotIn" "values" (list $gpuVal) }}
      {{- $selectorTerm := dict }}
      {{- if eq $v.gpuAff "include" }}
      {{-   $selectorTerm = dict "matchExpressions" (list $gpuExpr) }}
      {{- else }}
      {{-   $selectorTerm = dict "matchExpressions" (list $antiGpuExpr) }}
      {{- end }}
      {{- $combinedTerms := list }}
      {{- if gt (len $userTerms) 0 }}
      {{-   range $userTerm := $userTerms }}
      {{-     $term := deepCopy $userTerm }}
      {{-     $expressions := concat (get $term "matchExpressions" | default list) (get $selectorTerm "matchExpressions" | default list) }}
      {{-     $_ := set $term "matchExpressions" $expressions }}
      {{-     $combinedTerms = append $combinedTerms $term }}
      {{-   end }}
      {{- else }}
      {{-   $combinedTerms = list $selectorTerm }}
      {{- end }}
      {{- $_ := set $required "nodeSelectorTerms" $combinedTerms }}
      {{- $_ := set $nodeAffinity "requiredDuringSchedulingIgnoredDuringExecution" $required }}
      {{- $_ := set $affinity "nodeAffinity" $nodeAffinity }}
      affinity:
        {{- toYaml $affinity | nindent 8 }}
      {{- end }}
      {{- with $.Values.nodemon.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: zxporter-nodemon
          securityContext:
          {{- if $.Values.jvmMetrics.enabled }}
            runAsNonRoot: false
            runAsUser: 0
            readOnlyRootFilesystem: true
            capabilities:
              add:
                - SYS_PTRACE
          {{- else }}
          {{- toYaml $.Values.nodemon.securityContext | nindent 12 }}
          {{- end }}
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $.Values.nodemon.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          envFrom:
            - configMapRef:
                name: {{- include "zxporter-nodemon.config-map" $ | indent 1}}
          env:
            - name: "NODE_NAME"
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: "JVM_METRICS_ENABLED"
              value: {{ $.Values.jvmMetrics.enabled | quote }}

          {{- if $v.withDcgm }}
            - name: "DCGM_HOST"
              value: "localhost"
          {{- end }}
          resources:
            {{- toYaml $.Values.nodemon.resources | nindent 12 }}
        {{- if $v.withDcgm }}
        - name: dcgm-exporter
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
              drop:
                - NET_RAW
            runAsNonRoot: false
            runAsUser: 0
            {{- if eq $.Values.provider "gcp"}}
            privileged: true
            {{- end }}
          image: "{{ $.Values.dcgmExporter.image.repository }}:{{ $.Values.dcgmExporter.image.tag }}"
          imagePullPolicy: {{ $.Values.dcgmExporter.image.pullPolicy }}
          command: [ "/bin/bash", "-c" ]
          args:
          {{- if $.Values.dcgmExporter.useExternalHostEngine }}
            - hostname $NODE_NAME; for ((;;)) { r=$(dcgm-exporter --remote-hostengine-info ${NODE_IP} -f /etc/dcgm-exporter/counters.csv); echo "dcgm-exporter could not run"; sleep 60 ; }
          {{- else }}
            - hostname $NODE_NAME; for ((;;)) { r=$(dcgm-exporter -f /etc/dcgm-exporter/counters.csv); echo "dcgm-exporter could not run"; sleep 60 ; }
          {{- end }}
          ports:
            - name: "metrics"
              containerPort: 9400
          env:
            - name: "DCGM_EXPORTER_KUBERNETES"
              value: "true"
            - name: "DCGM_EXPORTER_LISTEN"
              value: ":9400"
            - name: "DCGM_EXPORTER_INTERVAL"
              value: "5000"
            - name: "NODE_NAME"
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- if $.Values.dcgmExporter.useExternalHostEngine }}
            - name: "NODE_IP"
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            {{- end }}
            {{- $hasCustomLDLibraryPath := false }}
            {{- range $.Values.dcgmExporter.extraEnv }}
            {{- if eq .name "LD_LIBRARY_PATH" }}
            {{- $hasCustomLDLibraryPath = true }}
            {{- end }}
            {{- end }}
            {{- if and (eq $.Values.provider "gcp") (not $hasCustomLDLibraryPath) }}
            - name: "LD_LIBRARY_PATH"
              value: "/usr/local/nvidia/lib64"
            {{- end }}
            {{- if eq $.Values.provider "gcp" }}
            - name: "DCGM_EXPORTER_KUBERNETES_GPU_ID_TYPE"
              value: "device-name"
            {{- end }}
            {{- with $.Values.dcgmExporter.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: "pod-gpu-resources"
              readOnly: true
              mountPath: "/var/lib/kubelet/pod-resources"
            {{- if eq $.Values.provider "gcp" }}
            - name: "nvidia-install-dir-host"
              mountPath: /usr/local/nvidia
            {{- end }}
            - name: {{- include "dcgm-exporter.config-map" $ | indent 1 }}
              mountPath: "/etc/dcgm-exporter"
        {{- end }}
{{- end }}
